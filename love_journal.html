<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>恋爱志</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* Settings Modal Styles */
        .app-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f5f7;
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .app-modal.active {
            display: flex;
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            margin-top: 40px; /* Status bar spacing */
        }
        .settings-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }
        .settings-group {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .settings-label {
            font-size: 16px;
            color: #1d1d1f;
        }
        .action-btn {
            background: #f2f2f2;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #1d1d1f;
        }
        
        .love-journal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: transparent; /* Transparent as requested */
            position: absolute;
            top: 40px; /* Adjust based on status bar area in phone frame */
            left: 0;
            right: 0;
            z-index: 10;
        }
        .header-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
            pointer-events: none;
        }
        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20; /* Ensure buttons are clickable above title layer if needed */
        }
        .content-area {
            padding-top: 90px; /* Space for header */
            padding-left: 20px;
            padding-right: 20px;
            height: 100%;
            overflow-y: auto;
            position: relative;
            z-index: 5; /* Above background but below header */
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="phone-frame" style="background: #fff; position: relative; overflow: hidden;"> 
            <!-- Background Layer -->
            <div id="love-journal-bg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-size: cover; background-position: center; transition: background-image 0.3s ease;"></div>

            <div class="love-journal-header">
                <div class="header-left">
                    <button class="header-btn" onclick="window.location.href='index.html'">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                </div>
                <div class="header-title">恋爱志</div>
                <div class="header-right">
                    <!-- Switch Icon -->
                    <button class="header-btn" id="switch-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 16V4M7 4L3 8M7 4L11 8M17 8V20M17 20L21 16M17 20L13 16"></path>
                        </svg>
                    </button>
                    <!-- Settings Icon -->
                    <button class="header-btn" id="settings-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="content-area">
                <!-- Placeholder Content -->
                <div id="placeholder-content" style="text-align: center; color: #86868b; margin-top: 100px;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#e5e5ea" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    <p>记录每一个心动瞬间</p>
                </div>
            </div>

            <!-- Settings Modal -->
            <div id="settings-modal" class="app-modal">
                <div class="settings-header">
                    <button class="header-btn" id="close-settings-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <div class="header-title">设置</div>
                    <button class="header-btn" id="save-settings-btn" style="font-weight: bold; font-size: 16px;">保存</button>
                </div>
                <div class="settings-content">
                    <div class="settings-group">
                        <div class="settings-item">
                            <span class="settings-label">更换壁纸</span>
                            <input type="file" id="wallpaper-input" accept="image/*" style="display: none;">
                            <button class="action-btn" id="upload-wallpaper-btn">选择图片</button>
                        </div>
                        <div id="wallpaper-preview" style="margin-top: 15px; width: 100%; height: 150px; background-color: #f2f2f2; border-radius: 8px; background-size: cover; background-position: center; display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const settingsBtn = document.getElementById('settings-btn');
            const settingsModal = document.getElementById('settings-modal');
            const closeSettingsBtn = document.getElementById('close-settings-btn');
            const saveSettingsBtn = document.getElementById('save-settings-btn');
            const uploadWallpaperBtn = document.getElementById('upload-wallpaper-btn');
            const wallpaperInput = document.getElementById('wallpaper-input');
            const wallpaperPreview = document.getElementById('wallpaper-preview');
            const loveJournalBg = document.getElementById('love-journal-bg');
            const placeholderContent = document.getElementById('placeholder-content');

            let tempWallpaper = null;

            // Load saved wallpaper
            const savedWallpaper = localStorage.getItem('love_journal_wallpaper');
            if (savedWallpaper) {
                loveJournalBg.style.backgroundImage = `url('${savedWallpaper}')`;
                placeholderContent.style.display = 'none'; // Hide placeholder if wallpaper exists
            }

            // Open Settings
            settingsBtn.addEventListener('click', () => {
                settingsModal.classList.add('active');
                // Always fetch the latest saved wallpaper
                const currentSavedWallpaper = localStorage.getItem('love_journal_wallpaper');
                if (currentSavedWallpaper) {
                    wallpaperPreview.style.backgroundImage = `url('${currentSavedWallpaper}')`;
                    wallpaperPreview.style.display = 'block';
                } else {
                    wallpaperPreview.style.display = 'none';
                    wallpaperPreview.style.backgroundImage = '';
                }
                tempWallpaper = null; // Reset temp
            });

            // Close Settings (without saving if not saved)
            closeSettingsBtn.addEventListener('click', () => {
                settingsModal.classList.remove('active');
                tempWallpaper = null; // Discard changes
            });

            // Upload Wallpaper Trigger
            uploadWallpaperBtn.addEventListener('click', () => {
                wallpaperInput.click();
            });

            // Handle File Input
            wallpaperInput.addEventListener('change', (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    tempWallpaper = event.target.result;
                    wallpaperPreview.style.backgroundImage = `url('${tempWallpaper}')`;
                    wallpaperPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
                wallpaperInput.value = ''; // Reset
            });

            // Save Settings
            saveSettingsBtn.addEventListener('click', () => {
                if (tempWallpaper) {
                    localStorage.setItem('love_journal_wallpaper', tempWallpaper);
                    loveJournalBg.style.backgroundImage = `url('${tempWallpaper}')`;
                    placeholderContent.style.display = 'none'; // Hide placeholder on save
                }
                settingsModal.classList.remove('active');
            });
        });
    </script>
</body>
</html>
