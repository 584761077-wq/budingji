<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Candy OS</title>
    <!-- Web App / PWA 全屏配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="布丁酱机">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-touch-fullscreen" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://img.heliar.top/file/1772810690199_IMG_6314.jpeg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chat_styles.css">
    <link rel="stylesheet" href="worldbook_styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <div class="phone-frame" id="phone-screen">
        <div class="screen active" id="home-screen">
            <!-- 顶部时间区域 -->
            <header class="header-section">
                <div class="time-display" id="clock">00:00</div>
                <div class="date-display" id="date">YYYY年MM月DD日</div>
            </header>

            <!-- 中间主要区域 -->
            <main class="main-content">
                <!-- 左侧亚克力立牌 -->
                <div class="standee-container">
                    <div class="acrylic-standee" id="standee">
                        <div class="standee-content">
                            <!-- 默认占位 SVG -->
                            <div class="placeholder-icon">
                                <svg width="80" height="120" viewBox="0 0 100 150" fill="none" stroke="#6d5b68" stroke-width="2" stroke-dasharray="5,5">
                                    <path d="M50 10 C30 10, 20 30, 20 50 C20 80, 10 90, 10 120 L90 120 C90 90, 80 80, 80 50 C80 30, 70 10, 50 10 Z" />
                                    <circle cx="50" cy="35" r="15" />
                                </svg>
                                <span class="placeholder-text">点击上传立牌</span>
                            </div>
                            <img id="standee-img" src="" alt="立牌图片" style="display: none;">
                        </div>
                        <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp" style="display: none;">
                    </div>
                    <!-- 新增底座 -->
                    <div class="standee-base">
                        <div class="base-top"></div>
                        <div class="base-side"></div>
                    </div>
                </div>

                <!-- 右侧四个并排软件 -->
                <div class="apps-grid-right">
                    <div class="app-icon candy-box" id="app-line">
                        <div class="icon-inner">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                            </svg>
                        </div>
                        <span class="app-name">LINE</span>
                    </div>
                    <div class="app-icon candy-box" id="app-worldbook">
                        <div class="icon-inner">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
                        </div>
                        <span class="app-name">世界书</span>
                    </div>
                    <div class="app-icon candy-box">
                        <div class="icon-inner"></div>
                        <span class="app-name">恋爱志</span>
                    </div>
                    <div class="app-icon candy-box">
                        <div class="icon-inner"></div>
                        <span class="app-name">约会</span>
                    </div>
                </div>
            </main>
        </div>

        <!-- 世界书页面 (INS 极简风) -->
        <div class="app-modal" id="worldbook-modal" style="display: none;">
                <div class="app-header">
                    <button class="header-btn back-btn" id="close-worldbook">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h2 class="header-title">世界书</h2>
                    <button class="header-btn save-btn" id="save-worldbook">保存</button>
                </div>
                <div class="app-content">
                    <div class="worldbook-toolbar">
                        <div class="toolbar-icons">
                            <button class="toolbar-icon-btn" id="add-worldbook-item-btn" title="添加">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                            <button class="toolbar-icon-btn" title="导入">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            </button>
                            <button class="toolbar-icon-btn" title="导出">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            </button>
                            <button class="toolbar-icon-btn" id="manage-categories-btn" title="管理">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="worldbook-categories">
                        <div class="category-tag active">未分类</div>
                        <!-- 动态生成分类 -->
                    </div>
                    <div class="worldbook-list">
                        <!-- 世界书条目将在这里显示 -->
                    </div>
                </div>
            </div>

            <!-- 添加世界书条目页面 -->
            <div class="app-modal" id="add-worldbook-item-modal" style="display: none;">
                <div class="app-header">
                    <button class="header-btn back-btn" id="close-add-worldbook-item">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h2 class="header-title">添加条目</h2>
                    <button class="header-btn save-btn" id="save-worldbook-item">保存</button>
                </div>
                <div class="app-content" style="padding: 20px;">
                    <div class="form-group">
                        <label class="form-label">名称</label>
                        <input type="text" class="form-input" id="wb-item-name" placeholder="输入条目名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <select class="form-select" id="wb-item-category">
                            <option value="未分类">未分类</option>
                            <option value="角色">角色</option>
                            <option value="地点">地点</option>
                            <option value="物品">物品</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">关键词</label>
                        <input type="text" class="form-input" id="wb-item-keywords" placeholder="输入关键词，用逗号分隔">
                    </div>
                    <div class="form-group" style="flex: 1; display: flex; flex-direction: column;">
                        <label class="form-label">内容</label>
                        <textarea class="form-textarea" id="wb-item-content" placeholder="输入详细内容..."></textarea>
                    </div>
                </div>
            </div>

            <!-- 分类管理页面 -->
            <div class="app-modal" id="category-manager-modal" style="display: none;">
                <div class="app-header">
                    <button class="header-btn back-btn" id="close-category-manager">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h2 class="header-title">分类管理</h2>
                    <div style="width: 40px;"></div> <!-- Spacer -->
                </div>
                <div class="app-content category-manager-content">
                    <div class="category-list">
                        <!-- 分类列表将在这里动态生成 -->
                    </div>
                    <div class="category-input-area">
                        <input type="text" class="category-input" id="new-category-input" placeholder="输入新分类名称">
                        <button class="add-category-btn" id="add-category-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                </div>
            </div>


            <!-- 底部 Dock 栏 -->
            <footer class="dock-container">
                <div class="dock-glass">
                    <div class="app-icon dock-icon" id="dock-settings">
                        <div class="icon-inner"></div>
                        <span class="app-name">设置</span>
                    </div>
                    <div class="app-icon dock-icon">
                        <div class="icon-inner"></div>
                        <span class="app-name">信息</span>
                    </div>
                    <div class="app-icon dock-icon">
                        <div class="icon-inner"></div>
                        <span class="app-name">浏览器</span>
                    </div>
                </div>
            </footer>

            <!-- 设置页面模态框 -->
            <div class="app-modal" id="settings-modal">
                <div class="app-header">
                    <button class="header-btn back-btn" id="close-settings">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h2 class="header-title">设置</h2>
                    <button class="header-btn save-btn" id="save-settings">保存</button>
                </div>
                
                <div class="app-content">
                    <div class="settings-card api-settings-card">
                        <h3 class="card-title">API 配置</h3>
                        <div class="form-group">
                            <label for="api-url">API 地址</label>
                            <input type="text" id="api-url" class="candy-input" placeholder="https://api.openai.com/v1">
                        </div>
                        <div class="form-group">
                            <label for="api-key">API Key</label>
                            <input type="password" id="api-key" class="candy-input" placeholder="sk-...">
                        </div>
                        <div class="form-group">
                            <label for="model-name">模型名称</label>
                            <div class="input-with-btn">
                                <div class="model-input-wrap" id="model-select-trigger">
                                    <input type="text" id="model-name" class="candy-input" placeholder="gpt-3.5-turbo">
                                    <button type="button" class="model-dropdown-arrow" id="model-dropdown-arrow" aria-label="展开模型列表">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                    </button>
                                </div>
                                <button id="fetch-models" class="candy-btn-small">拉取</button>
                            </div>
                        </div>
                        
                        <!-- 模型选择列表（默认隐藏，拉取后显示） -->
                        <div class="model-list-container" id="model-list-container" style="display: none;">
                            <div class="model-list" id="model-list"></div>
                        </div>

                        <!-- 新增设置项 -->
                        <div class="form-group toggle-group">
                            <label for="stream-toggle">流式输出</label>
                            <label class="switch">
                                <input type="checkbox" id="stream-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label for="temperature-slider">温度 (Temperature): <span id="temp-value">0.7</span></label>
                            <input type="range" id="temperature-slider" min="0" max="2" step="0.1" value="0.7" class="candy-range">
                        </div>
                    </div>
                </div>
            </div>

            <!-- LINE App Modal -->
            <div class="app-modal" id="line-modal">
                <div class="line-app-container">
                    <!-- LINE Header (Top Bar) -->
                    <div class="line-header">
                        <!-- Left Spacer -->
                        <div class="line-header-left"></div>
                        <!-- Right Icons -->
                        <div class="line-header-icons">
                            <div class="line-icon-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                            </div>
                            <div class="line-icon-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                            </div>
                            <div class="line-icon-btn" id="import-character-btn" style="cursor: pointer;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                            </div>
                            <input type="file" id="import-character-input" accept=".json,.png" style="display: none;">
                            <div class="line-icon-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                            </div>
                        </div>
                    </div>

                    <!-- Main Content (Home) -->
                    <div class="line-page active" id="line-home-page">
                        <div class="line-main-content">
                            <!-- User Info Row -->
                            <div class="line-user-row">
                                <div class="line-username">User Name</div>
                                <div class="line-avatar">
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#86868b" stroke-width="1.5">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"></path>
                                    </svg>
                                </div>
                            </div>

                            <!-- Middle Icons Row -->
                            <div class="line-middle-icons">
                                <div class="line-mid-item" id="sticker-icon-btn">
                                    <div class="line-mid-icon">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                                    </div>
                                    <span>贴图</span>
                                </div>
                                <div class="line-mid-item">
                                    <div class="line-mid-icon">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>
                                    </div>
                                    <span>主题</span>
                                </div>
                                <div class="line-mid-item">
                                    <div class="line-mid-icon">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                                    </div>
                                    <span>官方</span>
                                </div>
                            </div>

                            <!-- Groups List -->
                            <div class="line-groups-list">
                                <!-- 好友分组 -->
                                <div class="line-group-wrapper">
                                    <div class="line-group-item" data-target="friends-list">
                                        <span class="group-name">好友</span>
                                        <div class="group-arrow">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                        </div>
                                    </div>
                                    <div class="group-content" id="friends-list"></div>
                                </div>

                                <!-- 群分组 -->
                                <div class="line-group-wrapper">
                                    <div class="line-group-item" data-target="groups-list">
                                        <span class="group-name">群</span>
                                        <div class="group-arrow">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                        </div>
                                    </div>
                                    <div class="group-content" id="groups-list"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Chat Page (Hidden by default) -->
                    <div class="line-page" id="line-chat-page" style="display: none;">
                        <div class="line-chat-header">
                            <div class="chat-header-title">聊天</div>
                            <div class="chat-header-icons">
                                <div class="line-icon-btn">
                                    <!-- 编辑/列表图标 -->
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                </div>
                                <div class="line-icon-btn">
                                    <!-- 文件夹图标 -->
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                </div>
                                <div class="line-icon-btn" id="add-chat-btn">
                                    <!-- 添加聊天图标 -->
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><line x1="9" y1="10" x2="15" y2="10"></line><line x1="12" y1="7" x2="12" y2="13"></line></svg>
                                </div>
                            </div>
                        </div>
                        <div class="line-chat-list" id="line-chat-list">
                            <!-- 聊天列表将动态插入这里 -->
                            <div class="empty-chat-placeholder" style="padding: 20px; text-align: center; color: #86868b; font-size: 0.9rem;">
                                暂无聊天记录
                            </div>
                        </div>
                    </div>

                    <!-- 聊天界面 (Chat Room) -->
                    <div class="chat-room" id="chat-room" style="display: none;">
                        <!-- 背景壁纸 -->
                        <div class="chat-room-wallpaper"></div>
